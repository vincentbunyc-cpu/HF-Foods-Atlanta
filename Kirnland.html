<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>年丰食品 · 订货系统</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --ink:#1c1410;--red:#C41230;--red2:#9e0e26;
  --gold:#C8952A;--gold-lt:#fdf5e4;
  --cream:#faf7f2;--paper:#fff;
  --muted:#7a6e66;--border:#e8e0d6;
  --green:#2a7d4f;--green-lt:#eaf5ef;
  --orange:#c85d1a;--orange-lt:#fdf0e8;
  --sh:0 2px 10px rgba(28,20,16,.08);
  --sh-lg:0 10px 36px rgba(28,20,16,.16);
  --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans SC',sans-serif;background:var(--cream);color:var(--ink);height:100vh;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased;}

/* HEADER */
header{background:var(--ink);height:64px;display:flex;align-items:center;padding:0 20px;gap:16px;flex-shrink:0;z-index:20;box-shadow:0 2px 12px rgba(0,0,0,.25);}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.logo-seal{width:42px;height:42px;border:2px solid var(--gold);border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.logo-seal s1{font-family:'Noto Serif SC',serif;font-size:13px;font-weight:700;color:var(--gold);display:block;line-height:1.1;}
.logo-seal s2{font-size:7px;color:rgba(200,149,42,.55);letter-spacing:1px;display:block;}
.logo-text h1{font-family:'Noto Serif SC',serif;font-size:17px;font-weight:700;color:white;letter-spacing:3px;}
.logo-text p{font-size:9px;color:rgba(255,255,255,.4);letter-spacing:2px;margin-top:1px;}

.srch{flex:1;max-width:360px;position:relative;}
.srch input{width:100%;padding:9px 14px 9px 36px;background:rgba(255,255,255,.11);border:1px solid rgba(255,255,255,.14);border-radius:8px;color:white;font-family:inherit;font-size:13px;outline:none;transition:.2s;}
.srch input::placeholder{color:rgba(255,255,255,.38);}
.srch input:focus{background:rgba(255,255,255,.17);border-color:rgba(200,149,42,.45);}
.si{position:absolute;left:11px;top:50%;transform:translateY(-50%);opacity:.45;font-size:14px;}

.hd-date{font-size:10px;color:rgba(255,255,255,.35);white-space:nowrap;margin-left:auto;}
.hd-date strong{color:var(--gold);}

.hd-cart{background:var(--red);color:white;border:none;border-radius:8px;padding:9px 16px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:7px;white-space:nowrap;flex-shrink:0;transition:.15s;}
.hd-cart:hover{background:var(--red2);}
.cbadge{background:var(--gold);color:var(--ink);border-radius:10px;padding:1px 7px;font-size:11px;font-weight:900;min-width:20px;text-align:center;}

/* LAYOUT */
.body{display:flex;flex:1;overflow:hidden;}

/* SIDEBAR */
aside{width:136px;flex-shrink:0;background:var(--paper);border-right:1px solid var(--border);padding:10px 0;overflow-y:auto;display:flex;flex-direction:column;gap:1px;}
aside::-webkit-scrollbar{width:3px;}
aside::-webkit-scrollbar-thumb{background:var(--border);}
.catbtn{width:100%;padding:10px 10px;border:none;background:none;font-family:inherit;cursor:pointer;border-left:3px solid transparent;transition:.15s;border-radius:0 8px 8px 0;margin-right:6px;text-align:center;}
.catbtn:hover{background:var(--cream);}
.catbtn.on{background:var(--gold-lt);border-left-color:var(--gold);}
.catbtn.on .cname{color:var(--ink);font-weight:700;}
.cicon{font-size:18px;display:block;margin-bottom:3px;}
.cname{font-size:11px;color:var(--muted);font-weight:500;line-height:1.3;display:block;}
.cnum{display:inline-block;margin-top:3px;background:var(--border);color:var(--muted);font-size:9px;border-radius:8px;padding:1px 5px;}
.catbtn.on .cnum{background:var(--gold);color:white;}

/* GRID */
.grid-wrap{flex:1;overflow-y:auto;padding:16px 14px;}
.grid-wrap::-webkit-scrollbar{width:5px;}
.grid-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.grid-hd{display:flex;align-items:baseline;gap:10px;margin-bottom:14px;}
.grid-title{font-family:'Noto Serif SC',serif;font-size:19px;font-weight:700;}
.grid-sub{font-size:11px;color:var(--muted);}

.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:9px;}

/* PRODUCT CARD */
.pcard{background:var(--paper);border:1.5px solid var(--border);border-radius:var(--r);padding:13px 11px 10px;cursor:pointer;transition:border-color .15s,box-shadow .15s,transform .12s;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:3px;}
.pcard:hover{border-color:var(--gold);box-shadow:var(--sh);transform:translateY(-2px);}
.pcard.sel{border-color:var(--gold);background:var(--gold-lt);}
.pcard.oos{opacity:.5;}
.pcard-tag{position:absolute;top:0;right:0;background:var(--green);color:white;font-size:8px;font-weight:700;letter-spacing:.5px;padding:3px 7px;border-radius:0 var(--r) 0 7px;display:none;}
.pcard.sel .pcard-tag{display:block;}
.pc-code{font-size:9px;color:#c0b8b0;font-weight:700;letter-spacing:1px;}
.pc-cn{font-size:12px;font-weight:700;line-height:1.35;min-height:32px;color:var(--ink);}
.pc-en{font-size:9px;color:var(--muted);line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;}
.pc-price{font-size:18px;font-weight:900;color:var(--red);font-family:'Noto Serif SC',serif;margin-top:3px;line-height:1;}
.pc-price-unit{font-size:9px;color:var(--muted);font-weight:400;margin-left:2px;}
.pc-noprice{font-size:10px;color:#d0c8c0;margin-top:3px;}
.pc-stock{font-size:10px;margin-top:2px;display:flex;align-items:center;gap:3px;}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.s-ok{background:var(--green);}
.s-low{background:var(--orange);}
.s-out{background:#ccc;}
.pc-stock span{color:var(--muted);}
.pc-qty{display:none;align-items:center;justify-content:space-between;margin-top:8px;background:white;border:1.5px solid var(--border);border-radius:7px;overflow:hidden;}
.pcard.sel .pc-qty{display:flex;}
.qb{border:none;background:none;padding:6px 10px;font-size:17px;line-height:1;color:var(--red);cursor:pointer;font-weight:700;transition:.1s;}
.qb:hover{background:var(--gold-lt);}
.qv{font-size:14px;font-weight:800;color:var(--ink);min-width:26px;text-align:center;}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty .ei{font-size:44px;margin-bottom:12px;}

/* OVERLAY + CART PANEL */
.overlay{position:fixed;inset:0;background:rgba(28,20,16,.45);z-index:100;display:none;backdrop-filter:blur(3px);}
.overlay.open{display:block;}
.cpanel{position:fixed;top:0;right:-500px;bottom:0;width:500px;background:var(--paper);z-index:101;display:flex;flex-direction:column;transition:right .3s cubic-bezier(.4,0,.2,1);box-shadow:-4px 0 32px rgba(28,20,16,.18);}
.cpanel.open{right:0;}
.cph{background:var(--ink);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.cph h2{font-family:'Noto Serif SC',serif;font-size:17px;color:white;letter-spacing:1px;}
.cp-x{border:none;background:rgba(255,255,255,.12);color:white;width:32px;height:32px;border-radius:50%;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;}
.cp-x:hover{background:rgba(255,255,255,.22);}

/* Customer form */
.cpf{padding:12px 20px 10px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--cream);}
.cpf h3{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
.frow{display:flex;gap:8px;margin-bottom:6px;}
.ff{flex:1;}
.ff label{display:block;font-size:9px;color:var(--muted);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:3px;}
.ff input{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:7px;font-family:inherit;font-size:13px;outline:none;background:white;transition:.15s;}
.ff input:focus{border-color:var(--gold);}

/* Cart items */
.cpitems{flex:1;overflow-y:auto;padding:8px 20px;}
.cpitems::-webkit-scrollbar{width:4px;}
.cpitems::-webkit-scrollbar-thumb{background:var(--border);}
.cempty{text-align:center;padding:36px 20px;color:var(--muted);}
.cempty .ce{font-size:40px;margin-bottom:8px;}
.ci{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border);}
.ci:last-child{border-bottom:none;}
.ci-info{flex:1;}
.ci-code{font-size:9px;color:#ccc;letter-spacing:1px;font-weight:700;}
.ci-name{font-size:14px;font-weight:700;margin:2px 0;line-height:1.3;}
.ci-en{font-size:10px;color:var(--muted);}
.ci-price{font-size:12px;font-weight:800;color:var(--red);margin-top:2px;}
.ci-qty{display:flex;align-items:center;gap:5px;background:var(--cream);border:1.5px solid var(--border);border-radius:7px;overflow:hidden;flex-shrink:0;}
.ci-qty .qb{padding:5px 9px;font-size:15px;}
.ci-qty .qv{font-size:13px;min-width:22px;}

/* Note */
.cpnote{padding:10px 20px;border-top:1px solid var(--border);flex-shrink:0;}
.cpnote label{display:block;font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px;}
.cpnote textarea{width:100%;padding:8px 10px;height:52px;border:1.5px solid var(--border);border-radius:7px;font-family:inherit;font-size:12px;resize:none;outline:none;transition:.15s;}
.cpnote textarea:focus{border-color:var(--gold);}

/* Footer */
.cpfoot{padding:12px 20px;border-top:1px solid var(--border);flex-shrink:0;background:var(--cream);}
.fstats{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:12px;color:var(--muted);}
.fstats strong{font-size:15px;color:var(--ink);}
.dlbtn{width:100%;background:var(--red);color:white;border:none;border-radius:10px;padding:14px;font-family:'Noto Serif SC',serif;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:1px;box-shadow:0 4px 14px rgba(196,18,48,.3);transition:.15s;}
.dlbtn:hover{background:var(--red2);transform:translateY(-1px);box-shadow:0 6px 18px rgba(196,18,48,.4);}
.dlbtn:active{transform:none;}
.dlbtn:disabled{background:#ccc;box-shadow:none;cursor:not-allowed;transform:none;}

/* SUCCESS MODAL */
.modal{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;background:rgba(28,20,16,.55);backdrop-filter:blur(4px);}
.modal.open{display:flex;}
.mbox{background:white;border-radius:18px;padding:40px;text-align:center;max-width:340px;width:90%;box-shadow:var(--sh-lg);animation:pop .3s cubic-bezier(.34,1.56,.64,1);}
@keyframes pop{from{transform:scale(.8) translateY(16px);opacity:0}to{transform:none;opacity:1}}
.micon{font-size:52px;margin-bottom:12px;}
.mbox h2{font-family:'Noto Serif SC',serif;font-size:20px;color:var(--red);margin-bottom:8px;}
.mbox p{font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:20px;}
.mok{background:var(--ink);color:white;border:none;border-radius:9px;padding:12px 32px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:.15s;}
.mok:hover{background:#333;}
</style>
</head>

  <div class="cpitems" id="ci"></div>

</div>

<div class="modal" id="mdl">

    <p>Excel 文件已自动下载。<br>请将文件发给年丰处理订单。<br><br>感谢惠顾！</p>
    <button class="mok" onclick="closeModal()">好的，继续</button>
  </div>
</div>

const CATS=[...new Set(PRODS.map(p=>p.cat))].sort();
let activeCat=CATS[0], srchQ='';

document.getElementById('cd').value=new Date().toISOString().slice(0,10);
buildSB(); renderGrid();

function buildSB(){
  document.getElementById('sb').innerHTML=CATS.map(cat=>{
    const n=PRODS.filter(p=>p.cat===cat).length;
    const [ic,...rest]=cat.split(' '); const lb=rest.join(' ');
    return `<button class="catbtn${cat===activeCat?' on':''}" onclick="setcat('${cat}')">
      <span class="cicon">${ic}</span><span class="cname">${lb}</span><span class="cnum">${n}</span>
    </button>`;
  }).join('');
}

function setcat(cat){activeCat=cat;srchQ='';document.getElementById('srch').value='';buildSB();renderGrid();}
function onSearch(){srchQ=document.getElementById('srch').value.trim();renderGrid();}

function renderGrid(){
  const g=document.getElementById('grid');

    const q=srchQ.toLowerCase();

  } else {
    items=PRODS.filter(p=>p.cat===activeCat);
    const [ic,...rest]=activeCat.split(' ');
    titleHtml=`<span class="grid-title">${ic} ${rest.join(' ')}</span><span class="grid-sub">${items.length} 种</span>`;
  }
  if(!items.length){g.innerHTML='<div class="empty"><div class="ei">🔍</div><p>没有找到相关产品</p></div>';return;}
  const cards=items.map(p=>{
    const sel=!!cart[p.code];
    const qty=sel?cart[p.code].qty:1;
    const oos=p.stock<=0;
    const slow=p.stock>0&&p.stock<5;
    const sdot=oos?'s-out':slow?'s-low':'s-ok';
    const stxt=oos?'无库存':slow?`仅剩 ${p.stock} ${p.unit}`:`库存 ${p.stock} ${p.unit}`;
    return `<div class="pcard${sel?' sel':''}${oos?' oos':''}" id="pc_${p.code}" onclick="toggle('${p.code}')">
      <div class="pcard-tag">✓ 已选</div>
      <div class="pc-code">#${p.code}</div>
      <div class="pc-cn">${p.name_cn}</div>
      <div class="pc-en">${p.name_en}</div>
      ${p.price>0?`<div class="pc-price">$${p.price.toFixed(2)}<span class="pc-price-unit">/${p.unit}</span></div>`:`<div class="pc-noprice">价格请询问</div>`}
      <div class="pc-stock"><span class="sdot ${sdot}"></span><span>${stxt}</span></div>
      <div class="pc-qty" onclick="event.stopPropagation()">
        <button class="qb" onclick="chq('${p.code}',-1)">−</button>
        <span class="qv" id="qv_${p.code}">${qty}</span>
        <button class="qb" onclick="chq('${p.code}',1)">+</button>
      </div>
    </div>`;
  }).join('');
  g.innerHTML=`<div class="grid-hd">${titleHtml}</div><div class="pgrid">${cards}</div>`;
}

function toggle(code){
  const p=PRODS.find(x=>x.code===code); if(!p) return;
  if(cart[code]) delete cart[code]; else cart[code]={product:p,qty:1};
  refresh(code); badge();
}
function chq(code,d){
  if(!cart[code]){const p=PRODS.find(x=>x.code===code);if(p)cart[code]={product:p,qty:1};}
  cart[code].qty=Math.max(1,cart[code].qty+d);
  const v=document.getElementById('qv_'+code); if(v)v.textContent=cart[code].qty;
  if(document.getElementById('cp').classList.contains('open'))renderCI();
  badge();
}
function refresh(code){
  const el=document.getElementById('pc_'+code); if(!el)return;
  const sel=!!cart[code];
  el.className=el.className.replace(/\bsel\b/,'').replace(/  +/,' ').trim();
  if(sel)el.classList.add('sel');
  const qv=document.getElementById('qv_'+code);
  if(qv&&sel)qv.textContent=cart[code].qty;
}
function badge(){
  const n=Object.keys(cart).length;
  document.getElementById('badge').textContent=n;
  document.getElementById('dlbtn').disabled=n===0;
}

function openCart(){document.getElementById('ov').classList.add('open');document.getElementById('cp').classList.add('open');renderCI();}
function closeCart(){document.getElementById('ov').classList.remove('open');document.getElementById('cp').classList.remove('open');}

function renderCI(){
  const el=document.getElementById('ci');
  const keys=Object.keys(cart);
  if(!keys.length){el.innerHTML='<div class="cempty"><div class="ce">🛒</div><p>购物车为空</p></div>';document.getElementById('ic').textContent='0';document.getElementById('tq').textContent='0';return;}
  let tq=0;
  el.innerHTML=keys.map(code=>{
    const{product:p,qty}=cart[code]; tq+=qty;
    return `<div class="ci">
      <div class="ci-info">
        <div class="ci-code">#${p.code}</div>
        <div class="ci-name">${p.name_cn}</div>
        <div class="ci-en">${p.name_en}</div>
        ${p.price>0?`<div class="ci-price">$${p.price.toFixed(2)} / ${p.unit}</div>`:''}
      </div>
      <div class="ci-qty">
        <button class="qb" onclick="ciq('${code}',-1)">−</button>
        <span class="qv" id="cqv_${code}">${qty}</span>
        <button class="qb" onclick="ciq('${code}',1)">+</button>
      </div>
    </div>`;
  }).join('');
  document.getElementById('ic').textContent=keys.length;
  document.getElementById('tq').textContent=tq;
}

function ciq(code,d){
  if(!cart[code])return;
  cart[code].qty=Math.max(1,cart[code].qty+d);
  const v=document.getElementById('cqv_'+code);if(v)v.textContent=cart[code].qty;
  refresh(code);
  const tq=Object.values(cart).reduce((s,v)=>s+v.qty,0);
  document.getElementById('tq').textContent=tq;
  badge();
}

function submit(){
  const name=document.getElementById('cn').value.trim();
  if(!name){document.getElementById('cn').focus();document.getElementById('cn').style.borderColor='var(--red)';return;}
  document.getElementById('cn').style.borderColor='';
  const contact=document.getElementById('cc').value.trim();
  const phone=document.getElementById('cph').value.trim();
  const date=document.getElementById('cd').value;
  const note=document.getElementById('note').value.trim();

  const wb=XLSX.utils.book_new();
  const rows=[
    ['年丰食品 — 订货单 (2026/4/2 价格)'],
    [],
    ['餐馆名称',name,'','联系人',contact],
    ['联系电话',phone,'','订货日期',date],
    ['备注',note],
    [],
    ['序号','产品编号','中文名称','英文名称','单位','单价($)','订购数量','现有库存'],
  ];
  const items=Object.values(cart);
  items.forEach(({product:p,qty},i)=>{
    rows.push([i+1,p.code,p.name_cn,p.name_en,p.unit,p.price>0?p.price:'请询问',qty,p.stock>0?`${p.stock} ${p.unit}`:'无库存']);
  });
  rows.push([],[],[' ',' ',' ',' ','合计种数',items.length,items.reduce((s,v)=>s+v.qty,0),'']);
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:5},{wch:10},{wch:28},{wch:34},{wch:12},{wch:10},{wch:10},{wch:14}];
  ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:7}}];
  XLSX.utils.book_append_sheet(wb,ws,'订货单');
  XLSX.writeFile(wb,`年丰订单_${name}_${(date||'').replace(/-/g,'')}.xlsx`);
  closeCart();
  document.getElementById('mdl').classList.add('open');
}
function closeModal(){document.getElementById('mdl').classList.remove('open');}
</script>
</body>
